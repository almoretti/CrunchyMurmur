name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:editor
      - run: npm run check
      - run: cargo test --locked --manifest-path native/transcriber/Cargo.toml
      - run: npm audit --audit-level=high
      - run: npm run release:check

  windows:
    needs: validate
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require Windows signing credentials
        shell: pwsh
        run: |
          if (-not $env:CSC_LINK -or -not $env:CSC_KEY_PASSWORD) {
            throw 'WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD repository secrets are required.'
          }
      - run: npm run build:editor
      - run: npm run prepare:whisper:win
      - run: npm run prepare:transcriber:win
      - run: npx electron-builder --win --publish never -c.forceCodeSigning=true
      - run: node scripts/verify-update-manifest.js dist/latest.yml
      - run: npm run smoke:packaged -- dist\win-unpacked\CrunchyMurmur.exe
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  macos:
    needs: validate
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:editor
      - run: bash scripts/prepare-macos-icon.sh
      - run: bash scripts/build-macos-native.sh
      - run: npm run prepare:whisper:mac
      - run: npm run prepare:transcriber:mac
      - run: npm run test:e2e
        env:
          CRUNCHYMURMUR_DISABLE_NATIVE_HOTKEY: '1'
      - name: Require Apple signing and notarization credentials
        run: |
          test -n "$CSC_LINK" && test -n "$CSC_KEY_PASSWORD" && test -n "$APPLE_ID" && test -n "$APPLE_APP_SPECIFIC_PASSWORD" && test -n "$APPLE_TEAM_ID" || {
            echo 'MAC_CSC_LINK, MAC_CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID secrets are required.' >&2
            exit 1
          }
      - run: npx electron-builder --mac --publish never
      - run: node scripts/verify-update-manifest.js dist/latest-mac.yml
      - run: npm run smoke:packaged -- dist/mac-universal/CrunchyMurmur.app/Contents/MacOS/CrunchyMurmur
        env:
          CRUNCHYMURMUR_DISABLE_NATIVE_HOTKEY: '1'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y imagemagick cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - run: xvfb-run --auto-servernum npm run test:e2e
      - run: npm run build:linux
      - run: node scripts/verify-update-manifest.js dist/latest-linux.yml
      - run: xvfb-run --auto-servernum npm run smoke:packaged -- dist/linux-unpacked/crunchymurmur
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Add terminal installers and manifests
        run: |
          cp install.sh install.ps1 release-assets/
          chmod +x release-assets/install.sh
      - name: Generate checksums and SBOM
        run: |
          npm ci --ignore-scripts
          npm sbom --sbom-format spdx > release-assets/sbom.spdx.json
          cd release-assets
          sha256sum * > SHA256SUMS
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --generate-notes \
            --title "CrunchyMurmur ${GITHUB_REF_NAME#v}"
