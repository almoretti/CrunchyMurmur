name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:editor
      - run: npm run check
      - run: cargo test --locked --manifest-path native/transcriber/Cargo.toml
      - run: npm audit --audit-level=high
      - run: npm run release:check

  windows:
    needs: validate
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require Windows signing credentials
        shell: pwsh
        run: |
          if (-not $env:CSC_LINK -or -not $env:CSC_KEY_PASSWORD) {
            throw 'WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD repository secrets are required.'
          }
      - run: npm run build:editor
      - run: npm run prepare:whisper:win
      - run: npm run prepare:transcriber:win
      - run: npx electron-builder --win --publish never -c.forceCodeSigning=true
      - run: node scripts/verify-update-manifest.js dist/latest.yml
      - run: npm run smoke:packaged -- dist\win-unpacked\CrunchyMurmur.exe
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  macos-transcriber:
    needs: validate
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/prepare-transcriber-runtime.js --platform darwin --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-transcriber-${{ matrix.arch }}
          path: build/transcriber-runtime/mac-${{ matrix.arch }}/crunchymurmur-transcriber
          if-no-files-found: error

  macos:
    needs: [validate, macos-transcriber]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:editor
      - run: bash scripts/prepare-macos-icon.sh
      - run: bash scripts/build-macos-native.sh
      - run: npm run prepare:whisper:mac
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-transcriber-x64
          path: build/transcriber-runtime/mac-x64
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-transcriber-arm64
          path: build/transcriber-runtime/mac-arm64
      - run: npm run prepare:transcriber:mac
      - run: npm run test:e2e
        env:
          CRUNCHYMURMUR_DISABLE_NATIVE_HOTKEY: '1'
      - name: Prepare Apple notarization API key
        env:
          APPLE_NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "$APPLE_NOTARY_API_KEY" && test -n "$APPLE_API_KEY_ID" && test -n "$APPLE_API_ISSUER" || {
            echo 'APPLE_NOTARY_API_KEY, APPLE_NOTARY_KEY_ID, and APPLE_NOTARY_ISSUER_ID secrets are required.' >&2
            exit 1
          }
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_NOTARY_API_KEY" | base64 -d > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          echo "APPLE_API_KEY=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
      - name: Require Apple signing credentials
        env:
          CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK" && test -n "$CSC_KEY_PASSWORD" && test -n "$APPLE_TEAM_ID" || {
            echo 'APPLE_DEVELOPER_ID_CERTIFICATE, APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD, and APPLE_TEAM_ID secrets are required.' >&2
            exit 1
          }
      - name: Build, sign, and notarize macOS release
        env:
          CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never
      - run: node scripts/verify-update-manifest.js dist/latest-mac.yml
      - run: npm run smoke:packaged -- dist/mac-universal/CrunchyMurmur.app/Contents/MacOS/CrunchyMurmur
        env:
          CRUNCHYMURMUR_DISABLE_NATIVE_HOTKEY: '1'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y imagemagick cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - run: xvfb-run --auto-servernum npm run test:e2e
      - run: npm run build:linux
      - run: node scripts/verify-update-manifest.js dist/latest-linux.yml
      - run: xvfb-run --auto-servernum npm run smoke:packaged -- dist/linux-unpacked/crunchymurmur
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Add terminal installers and manifests
        run: |
          cp install.sh install.ps1 release-assets/
          chmod +x release-assets/install.sh
      - name: Generate checksums and SBOM
        run: |
          npm ci --ignore-scripts
          npm sbom --sbom-format spdx > release-assets/sbom.spdx.json
          cd release-assets
          sha256sum * > SHA256SUMS
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --generate-notes \
            --title "CrunchyMurmur ${GITHUB_REF_NAME#v}"
