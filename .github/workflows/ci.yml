name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: cargo test --locked --manifest-path native/transcriber/Cargo.toml
      - run: npm audit --audit-level=high
      - run: npm run release:check
      - name: Validate Unix source bootstrap
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/source/run-from-source.sh
          sh scripts/source/run-from-source.sh --help >/dev/null
      - name: Validate Windows source bootstrap
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path 'scripts/source/run-from-source.ps1'),
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count) { $errors | Format-List; exit 1 }
      - name: Electron smoke test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: Electron smoke test
        if: runner.os != 'Linux'
        run: npm run test:e2e

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pack:win
      - run: npm run smoke:packaged -- dist\win-unpacked\CrunchyMurmur.exe

  package-macos-intel-transcriber:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: brew install onnxruntime
      - name: Build Intel transcriber with Homebrew ONNX Runtime
        run: node scripts/prepare-transcriber-runtime.js --platform darwin --arch x64
        env:
          ORT_LIB_PATH: /usr/local/opt/onnxruntime/lib
          ORT_PREFER_DYNAMIC_LINK: '1'
          CRUNCHYMURMUR_ONNX_RUNTIME_LIB: /usr/local/opt/onnxruntime/lib
      - name: Verify the bundled Intel runtime is portable
        run: |
          find build/transcriber-runtime/mac-x64 -name 'libonnxruntime*.dylib' -print -quit | grep -q .
          ! otool -L build/transcriber-runtime/mac-x64/* | grep -E '/usr/local/(Cellar|opt)/'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-macos-transcriber-x64
          path: build/transcriber-runtime/mac-x64/
          if-no-files-found: error

  package-macos-universal:
    needs: package-macos-intel-transcriber
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:editor
      - run: bash scripts/prepare-macos-icon.sh
      - run: bash scripts/build-macos-native.sh
      - run: npm run prepare:whisper:mac
      - run: node scripts/prepare-transcriber-runtime.js --platform darwin --arch arm64
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-macos-transcriber-x64
          path: build/transcriber-runtime/mac-x64
      - run: npm run prepare:transcriber:mac
      - run: node scripts/verify-macos-package-runtimes.js
      - name: Build unsigned universal macOS app
        run: npx electron-builder --mac --universal --dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: npm run smoke:packaged -- dist/mac-universal/CrunchyMurmur.app/Contents/MacOS/CrunchyMurmur
        env:
          CRUNCHYMURMUR_DISABLE_NATIVE_HOTKEY: '1'
