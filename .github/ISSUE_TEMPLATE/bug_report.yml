name: Bug report
description: Report a reproducible CrunchyMurmur problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Do not include API keys, private feed URLs, or real recordings.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CrunchyMurmur version
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system and version
      description: Include architecture and Linux desktop/session where relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
