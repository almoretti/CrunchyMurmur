name: Feature request
description: Propose a focused improvement to CrunchyMurmur
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome and relevant alternatives.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [All, Windows, macOS, Linux]
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included credentials, private calendar URLs, recordings, transcripts, or notes.
          required: true
  - type: markdown
    attributes:
      value: Thanks for helping improve CrunchyMurmur.

