<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <link rel="stylesheet" href="floating.css" />
  </head>
  <body>
    <main class="overlay">
      <div class="status-mark" aria-hidden="true"><span></span></div>
      <div class="copy">
        <div class="label" id="label"></div>
        <div class="timer" id="timer">0:00</div>
      </div>
      <div class="waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <button class="stop" id="stop" type="button" hidden>
        <span class="stop-icon" aria-hidden="true"></span>
        <span id="stopLabel"></span>
      </button>
    </main>
    <script src="i18n.js"></script>
    <script src="floating.js"></script>
  </body>
</html>
